name: Publish

on:
  push:
    branches:
      - master

permissions:
  id-token: write # Required for OIDC
  contents: write # Required to push to the 'binaries' and 'gh-pages' branches

jobs:
  publish:
    name: Build and publish to GitHub Pages and npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Build bindings
        run: docker run --rm --user=$(id -u) --env HOME="/tmp/" -v ${PWD}:/app -w /app emscripten/emsdk:3.1.14 /bin/bash ./build.sh

      - name: Install JS dependencies
        run: npm ci

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) dist

      - name: Build JS library
        run: npm run build-rollup

      - name: Build TypeScript types
        run: npm run build-types

      - name: Deploy to 'binaries' branch
        if: success()
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: binaries
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy required files to demo
        run: cp dist/index.umd.min.js demo/rubberband.umd.min.js && cp dist/rubberband-processor.min.js demo/rubberband-processor.js && cp dist/rubberband.wasm demo/rubberband.wasm

      - name: Deploy demo to 'gh-pages' branch
        if: success()
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: gh-pages
          build_dir: demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish
        env:
          CI: true
