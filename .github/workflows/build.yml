name: Build

on:
  push:

permissions:
  contents: read

jobs:
  build-wasm:
    name: Build the source code into WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Build bindings
        run: docker run --rm --user=$(id -u) --env HOME="/tmp/" -v ${PWD}:/app -w /app emscripten/emsdk:6.0.1 /bin/bash ./build.sh

      - name: Install JS dependencies
        run: npm ci

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) dist

      - name: Build JS library
        run: npm run build-rollup

      - name: Build TypeScript types
        run: npm run build-types
